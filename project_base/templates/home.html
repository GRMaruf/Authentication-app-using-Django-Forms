<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <title>Testing Authentication</title>

    <style>
      body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        font-family: Arial, sans-serif;
      }
      
      .button-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        text-align: center;
      }
      
      .btn-custom {
        width: 150px;
        margin: 10px 0;
        border-radius: 25px;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="button-box">
      <a href="{% url 'register' %}"><button class="btn btn-light btn-custom">Register</button></a>
      <br />
      <a href="{% url 'login' %}"><button class="btn btn-light btn-custom">Login</button></a>
      <br />

      {% if request.user.is_authenticated %}
        <a href="{% url 'logout' %}"><button class="btn btn-light btn-custom" disabled>Logout</button></a>
      {% else %}
        <p class="text-dark btn-custom">You cannot logout</p>
      {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
